[workspace]
resolver = "3"
members = ["crates/modeleaf-protocol"]
default-members = ["."]

[package]
name = "modeleaf"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"

[dependencies]
ropey = "1"
crossterm = { version = "0.29", features = ["event-stream"] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["full"] }
futures = "0.3"
taffy = "0.11"
tempfile = "3"
unicode-width = "0.2"
serde_json = "1"
modeleaf-protocol = { path = "crates/modeleaf-protocol" }
deno_ast = { version = "0.50.3", features = ["transpiling"] }
v8 = { version = "=149.3.0", default-features = false, features = [
    "simdutf",
    "use_custom_libcxx",
] }
