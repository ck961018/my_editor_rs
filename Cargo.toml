[package]
name = "my_editor_rs"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
ropey = "1"
crossterm = { version = "0.29", features = ["event-stream"] }
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["full"] }
futures = "0.3"
taffy = "0.11"
tempfile = "3"
unicode-width = "0.2"
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
