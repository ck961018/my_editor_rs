[workspace]
resolver = "3"
members = [
    "crates/modeleaf-core",
    "crates/modeleaf-frontend",
    "crates/modeleaf-protocol",
    "crates/modeleaf-tui",
]
default-members = ["."]

[package]
name = "modeleaf"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["full"] }
tempfile = "3"
serde_json = "1"
modeleaf-protocol = { path = "crates/modeleaf-protocol" }
modeleaf-core = { path = "crates/modeleaf-core" }
modeleaf-frontend = { path = "crates/modeleaf-frontend" }
modeleaf-tui = { path = "crates/modeleaf-tui" }
deno_ast = { version = "0.50.3", features = ["transpiling"] }
v8 = { version = "=149.3.0", default-features = false, features = [
    "simdutf",
    "use_custom_libcxx",
] }
